<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南京瑞雨山科技有限公司 | 3D数字展厅</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #F5F4F0; color: #2C1A14; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧栏 */
        .sidebar { width: 360px; background-color: #FAF8F5; border-right: 1px solid #EBE6DF; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; z-index: 100; transition: left 0.3s ease; }
        .brand-title { font-family: 'Noto Serif SC', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; color: #3E2723; }
        .search-box { width: 100%; padding: 12px 15px; border: 1px solid #D7CCC8; border-radius: 6px; background: transparent; margin-bottom: 25px; font-size: 0.95rem; outline: none; }
        .category-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .category-item { padding: 8px 14px; background-color: #EFEBE4; border-radius: 20px; font-size: 0.85rem; cursor: pointer; color: #5D4037; transition: all 0.3s; }
        .category-item:hover { background-color: #3E2723; color: #FFF; }
        
        /* 产品信息 */
        .product-info { margin-top: auto; }
        .product-name { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; margin: 0 0 10px 0; }
        .product-price { font-size: 1.4rem; color: #8D6E63; font-weight: bold; margin-bottom: 20px; }
        .product-desc { font-size: 0.95rem; line-height: 1.8; color: #5D4037; margin-bottom: 30px; }
        
        /* 3D 视图 */
        .model-viewer-container { flex: 1; position: relative; background-color: #F5F4F0; }
        model-viewer { width: 100%; height: 100%; outline: none; --poster-color: transparent; }
        
        /* 移动端菜单 */
        .mobile-header { display: none; padding: 15px 20px; background-color: #FAF8F5; border-bottom: 1px solid #EBE6DF; align-items: center; justify-content: space-between; }
        .hamburger { font-size: 1.5rem; background: none; border: none; cursor: pointer; color: #3E2723; }
        .mobile-info-container { display: none; }
        
        /* 微信悬浮窗 */
        .wechat-float { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: #3E2723; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: white; font-size: 0.8rem; font-weight: bold;}
        .wechat-qr { display: none; position: fixed; bottom: 90px; right: 30px; width: 160px; border: 1px solid #EBE6DF; border-radius: 8px; z-index: 1000; background: #FFF; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .wechat-qr img { width: 100%; height: auto; border-radius: 4px; }
        .wechat-qr p { margin: 8px 0 0 0; font-size: 0.85rem; color: #3E2723; font-weight: bold; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 80%; max-width: 320px; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .model-viewer-container { height: 55vh; flex: none; }
            .sidebar .product-info { display: none; }
            .mobile-info-container { display: block; padding: 20px; background: #FAF8F5; flex: 1; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 移动端顶部 -->
        <div class="mobile-header">
            <button class="hamburger" onclick="toggleMenu()">☰</button>
            <div class="brand-title" style="margin-bottom: 0;">南京瑞雨山科技</div>
            <div style="width: 24px;"></div>
        </div>

        <!-- 侧边导航栏 -->
        <div class="sidebar" id="sidebar">
            <div class="brand-title">南京瑞雨山科技有限公司</div>
            <input type="text" class="search-box" placeholder="搜索红木摆件..." />
            
            <div class="category-list">
                <!-- 点击直接重新加载页面并带上参数 -->
                <div class="category-item" onclick="window.location.href='?id=moxing_01'">圆底座01 (点击测试)</div>
                <div class="category-item">圆形几架</div>
                <div class="category-item">方形底座</div>
                <div class="category-item">方形几架</div>
            </div>
            
            <!-- 电脑端信息区 -->
            <div class="product-info">
                <h1 class="product-name">加载中...</h1>
                <div class="product-price">---</div>
                <p class="product-desc">请点击上方分类按钮，或在网址后加上 ?id=moxing_01 查看模型。</p>
            </div>
        </div>

        <!-- 3D 渲染区 -->
        <div class="model-viewer-container" onclick="closeMenu()">
            <model-viewer id="main-viewer" auto-rotate camera-controls shadow-intensity="1.5" exposure="1.1" environment-image="neutral" alt="3D 高端红木展示"></model-viewer>
        </div>

        <!-- 移动端底部信息区 -->
        <div class="mobile-info-container">
            <h1 class="product-name">加载中...</h1>
            <div class="product-price">---</div>
            <p class="product-desc">请点击左上角菜单选择产品。</p>
        </div>
    </div>

    <!-- 微信客服悬浮窗 (读取外层的wechat.jpg) -->
    <div class="wechat-float" onclick="toggleWechat()">微信</div>
    <div class="wechat-qr" id="wechat-qr">
        <img src="./wechat.jpg" alt="主理人微信">
        <p>扫码添加主理人</p>
    </div>

    <!-- 动态数据拉取逻辑 -->
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleWechat() { 
            const qr = document.getElementById('wechat-qr');
            qr.style.display = qr.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const folderName = urlParams.get('id');

            const names = document.querySelectorAll('.product-name');
            const prices = document.querySelectorAll('.product-price');
            const descs = document.querySelectorAll('.product-desc');
            const viewer = document.getElementById('main-viewer');

            if (folderName) {
                const folderPath = `./products/${folderName}/`;
                
                // 读取 info.json
                fetch(folderPath + 'info.json')
                    .then(res => {
                        if(!res.ok) throw new Error();
                        return res.json();
                    })
                    .then(data => {
                        names.forEach(el => el.innerText = data.name || '未命名产品');
                        prices.forEach(el => el.innerText = data.price || '价格未定');
                        descs.forEach(el => el.innerText = data.description || '暂无描述');
                    })
                    .catch(err => {
                        names.forEach(el => el.innerText = '未找到产品');
                        descs.forEach(el => el.innerText = '请检查 info.json 是否上传。');
                    });
                
                // 读取模型，后缀改为了 .glb
                viewer.src = folderPath + 'model.glb';
            } else {
                names.forEach(el => el.innerText = '请选择红木展品');
                prices.forEach(el => el.innerText = '');
            }
        });
    </script>
</body>
</html>
