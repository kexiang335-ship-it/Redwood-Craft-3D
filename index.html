    <script>
        const products = [
            { 
                id: 1, 
                name: "01 紫光檀圆底座", 
                tag1: "紫光檀", tag2: "整木挖空",
                short: "密度极高 / 温润如玉", 
                desc: "极简的圆形设计，底部带有微小的垫足。紫光檀深邃的色泽在光线下呈现出幽黑的光晕，是茶室案头的绝佳点缀。",
                mtlPath: "model_1/material.mtl", 
                // ↓↓↓ 重点：这里已经改成了你真实上传的那个长名字文件 ↓↓↓
                objPath: "model_1/379848b4233db44fd73ee55af3d2df81.obj"
            },
            { 
                id: 2, 
                name: "02 几何矩形瘿木底座", 
                tag1: "老挝瘿木", tag2: "榫卯拼合",
                short: "现代设计融合 / 天然树瘤纹", 
                desc: "不仅有传统的沉稳，更融入了现代的几何线条。中间这块纹理独特的瘿木，如同天然画卷，适合搭配现代简约茶具。",
                mtlPath: "model_2/material.mtl", 
                objPath: "model_2/model.obj"
            },
            { 
                id: 3, 
                name: "03 经典方胜纹托盘", 
                tag1: "大红酸枝", tag2: "透雕工艺",
                short: "高实用性 / 书房百搭", 
                desc: "方胜纹代表着同心双合、延绵不断。这款托盘实用性极强，无论是放置茶杯还是文房四宝，都能压住整个桌面的气场。",
                mtlPath: "model_3/material.mtl", 
                objPath: "model_3/model.obj"
            }
        ];

        let activeId = 1;

        function renderList() {
            const listEl = document.getElementById('item-list');
            listEl.innerHTML = products.map(p => `
                <div onclick="selectItem(${p.id})" class="p-3 rounded cursor-pointer transition border ${activeId === p.id ? 'bg-dark border-gold' : 'bg-dark border-gray-800 hover:border-gray-600'}">
                    <h3 class="${activeId === p.id ? 'text-gold' : 'text-gray-300'} font-bold text-sm">${p.name}</h3>
                    <p class="text-xs text-gray-500 mt-1">${p.short}</p>
                </div>
            `).join('');
            
            const activeProduct = products.find(p => p.id === activeId);
            document.getElementById('detail-title').innerText = activeProduct.name.substring(3);
            document.getElementById('detail-tag1').innerText = activeProduct.tag1;
            document.getElementById('detail-tag2').innerText = activeProduct.tag2;
            document.getElementById('detail-short').innerText = activeProduct.short;
            document.getElementById('detail-desc').innerText = activeProduct.desc;
        }

        function selectItem(id) {
            if (activeId === id) return; 
            activeId = id;
            renderList();
            
            const activeProduct = products.find(p => p.id === activeId);
            if (window.switch3DModel) {
                window.switch3DModel(activeProduct.mtlPath, activeProduct.objPath);
            }
        }
        
        renderList();
    </script>
